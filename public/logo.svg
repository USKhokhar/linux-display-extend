<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linux Display Extend animated logo</title>
  <desc id="desc">An animated brand mark showing a Linux workstation extending its display to a second device through a flowing bridge of light.</desc>

  <defs>
    <linearGradient id="shellBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1726"/>
      <stop offset="55%" stop-color="#13233a"/>
      <stop offset="100%" stop-color="#0a111c"/>
    </linearGradient>

    <radialGradient id="ambientA" cx="28%" cy="26%" r="62%">
      <stop offset="0%" stop-color="#44d1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#44d1ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientB" cx="78%" cy="30%" r="58%">
      <stop offset="0%" stop-color="#8dff8a" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#8dff8a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientC" cx="55%" cy="78%" r="54%">
      <stop offset="0%" stop-color="#ffb95a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffb95a" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="frameStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8be7ff" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#4aa7ff" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#8fff9e" stop-opacity="0.74"/>
    </linearGradient>

    <linearGradient id="linuxScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#112840"/>
      <stop offset="55%" stop-color="#183a58"/>
      <stop offset="100%" stop-color="#091723"/>
    </linearGradient>

    <linearGradient id="tabletScreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1e33"/>
      <stop offset="58%" stop-color="#102b42"/>
      <stop offset="100%" stop-color="#07121d"/>
    </linearGradient>

    <linearGradient id="bridgeLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42d4ff"/>
      <stop offset="55%" stop-color="#79ffcb"/>
      <stop offset="100%" stop-color="#ffd76d"/>
    </linearGradient>

    <linearGradient id="pulseLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#42d4ff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#42d4ff" stop-opacity="0.95"/>
      <stop offset="72%" stop-color="#8fff9e" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#ffd76d" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="typeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4fbff"/>
      <stop offset="50%" stop-color="#8de7ff"/>
      <stop offset="100%" stop-color="#9cffb4"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#02060c" flood-opacity="0.42"/>
    </filter>

    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="linuxClip">
      <rect x="96" y="58" width="188" height="106" rx="18"/>
    </clipPath>

    <clipPath id="tabletClip">
      <rect x="442" y="44" width="114" height="150" rx="28"/>
    </clipPath>

    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M 14 0 L 0 0 0 14" fill="none" stroke="#9ee7ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="18" y="18" width="684" height="244" rx="34" fill="url(#shellBg)"/>
    <rect x="18" y="18" width="684" height="244" rx="34" fill="url(#ambientA)"/>
    <rect x="18" y="18" width="684" height="244" rx="34" fill="url(#ambientB)"/>
    <rect x="18" y="18" width="684" height="244" rx="34" fill="url(#ambientC)"/>
    <rect x="18" y="18" width="684" height="244" rx="34" fill="url(#grid)"/>
    <rect x="18.75" y="18.75" width="682.5" height="242.5" rx="33.25" fill="none" stroke="url(#frameStroke)" stroke-opacity="0.32"/>
  </g>

  <g opacity="0.8">
    <circle cx="84" cy="58" r="2.4" fill="#8ee7ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="610" cy="52" r="2.1" fill="#8fff9e">
      <animate attributeName="opacity" values="0.25;0.95;0.25" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="656" cy="84" r="1.8" fill="#ffd76d">
      <animate attributeName="opacity" values="0.15;0.9;0.15" dur="4.9s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <g>
      <rect x="84" y="44" width="212" height="126" rx="22" fill="#09121d"/>
      <rect x="96" y="58" width="188" height="106" rx="18" fill="url(#linuxScreen)"/>
      <rect x="96" y="58" width="188" height="106" rx="18" fill="none" stroke="url(#frameStroke)" stroke-opacity="0.34"/>
      <rect x="120" y="174" width="140" height="10" rx="5" fill="#0a1623"/>
      <rect x="104" y="184" width="172" height="10" rx="5" fill="#13263a"/>

      <g clip-path="url(#linuxClip)">
        <rect x="96" y="58" width="188" height="106" fill="url(#grid)" opacity="0.35"/>
        <path d="M112 86 H150" stroke="#8fff9e" stroke-width="5" stroke-linecap="round"/>
        <path d="M120 100 H198" stroke="#42d4ff" stroke-width="4" stroke-linecap="round" opacity="0.95"/>
        <path d="M120 114 H214" stroke="#f4fbff" stroke-opacity="0.8" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M120 127 H188" stroke="#8fff9e" stroke-opacity="0.78" stroke-width="3.5" stroke-linecap="round"/>
        <path d="M120 140 H240" stroke="#42d4ff" stroke-opacity="0.55" stroke-width="3.5" stroke-linecap="round"/>

        <g transform="translate(238 111)">
          <circle r="22" fill="#0d2236" stroke="#63dcff" stroke-opacity="0.26"/>
          <path d="M-11 -4 C-4 -15 10 -15 16 -3 C18 3 17 12 8 18 C3 21 -3 22 -8 18 C-15 13 -16 4 -11 -4 Z" fill="#f3fbff"/>
          <path d="M-4 -1 C0 -5 7 -5 10 -1 C13 4 11 10 6 13 C2 15 -2 15 -6 12 C-10 8 -9 3 -4 -1 Z" fill="#121d29"/>
          <circle cx="-2.5" cy="2" r="1.8" fill="#8fff9e"/>
          <circle cx="6" cy="2" r="1.8" fill="#42d4ff"/>
          <path d="M-1 9 H5" stroke="#ffd76d" stroke-width="2.4" stroke-linecap="round"/>
        </g>

        <rect x="96" y="58" width="188" height="106" fill="url(#ambientA)" opacity="0.3">
          <animate attributeName="opacity" values="0.18;0.36;0.18" dur="6s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <g filter="url(#glow)">
      <path d="M306 111 C344 90 384 90 426 111" fill="none" stroke="url(#bridgeLight)" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
      <path d="M306 121 C344 103 384 103 426 121" fill="none" stroke="url(#bridgeLight)" stroke-width="14" stroke-linecap="round" opacity="0.22"/>
      <path d="M306 111 C344 90 384 90 426 111" fill="none" stroke="url(#pulseLine)" stroke-width="4" stroke-linecap="round">
        <animate attributeName="stroke-dasharray" values="1 220;80 140;1 220" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="stroke-dashoffset" values="0;-170;-340" dur="2.8s" repeatCount="indefinite"/>
      </path>

      <g>
        <rect x="326" y="97" width="12" height="12" rx="4" fill="#42d4ff">
          <animate attributeName="x" values="320;414" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="y" values="102;96;102" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
        </rect>
        <rect x="350" y="117" width="10" height="10" rx="3.5" fill="#8fff9e">
          <animate attributeName="x" values="332;426" dur="2.7s" begin="-0.9s" repeatCount="indefinite"/>
          <animate attributeName="y" values="120;112;120" dur="2.7s" begin="-0.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;1;0" dur="2.7s" begin="-0.9s" repeatCount="indefinite"/>
        </rect>
        <rect x="342" y="106" width="8" height="8" rx="3" fill="#ffd76d">
          <animate attributeName="x" values="316;404" dur="1.9s" begin="-0.4s" repeatCount="indefinite"/>
          <animate attributeName="y" values="114;101;114" dur="1.9s" begin="-0.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.95;0" dur="1.9s" begin="-0.4s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <g>
      <rect x="430" y="32" width="138" height="174" rx="34" fill="#09121d"/>
      <rect x="442" y="44" width="114" height="150" rx="28" fill="url(#tabletScreen)"/>
      <rect x="442" y="44" width="114" height="150" rx="28" fill="none" stroke="url(#frameStroke)" stroke-opacity="0.38"/>
      <circle cx="499" cy="51" r="4.2" fill="#14283d"/>
      <rect x="484" y="50" width="30" height="3" rx="1.5" fill="#20344c"/>

      <g clip-path="url(#tabletClip)">
        <rect x="442" y="44" width="114" height="150" fill="url(#grid)" opacity="0.36"/>
        <path d="M466 74 H532" stroke="#f4fbff" stroke-opacity="0.95" stroke-width="5" stroke-linecap="round"/>
        <path d="M466 91 H522" stroke="#42d4ff" stroke-width="4" stroke-linecap="round"/>
        <path d="M466 107 H516" stroke="#8fff9e" stroke-width="4" stroke-linecap="round" opacity="0.82"/>

        <rect x="466" y="122" width="66" height="44" rx="16" fill="#10263a" stroke="#63dcff" stroke-opacity="0.18"/>
        <path d="M484 154 L498 135 L509 145 L518 133 L530 154 Z" fill="none" stroke="#8fff9e" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="484" cy="136" r="3.4" fill="#ffd76d"/>

        <rect x="456" y="170" width="86" height="10" rx="5" fill="#12314a">
          <animate attributeName="opacity" values="0.55;1;0.55" dur="3.5s" repeatCount="indefinite"/>
        </rect>
        <rect x="456" y="170" width="58" height="10" rx="5" fill="url(#bridgeLight)">
          <animate attributeName="width" values="26;78;42;26" dur="3.5s" repeatCount="indefinite"/>
        </rect>

        <g opacity="0.88">
          <circle cx="500" cy="118" r="22" fill="none" stroke="#42d4ff" stroke-opacity="0.36" stroke-width="2">
            <animate attributeName="r" values="10;24;10" dur="3.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.2;0.65;0.2" dur="3.2s" repeatCount="indefinite"/>
          </circle>
          <circle cx="500" cy="118" r="10" fill="#8fff9e" fill-opacity="0.15"/>
        </g>
      </g>
    </g>
  </g>

  <g transform="translate(95 222)">
    <text x="0" y="0" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="18" font-weight="600" letter-spacing="4.5" fill="#eff8ff">
      LINUX DISPLAY
    </text>
    <text x="0" y="28" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="34" font-weight="800" letter-spacing="2.4" fill="url(#typeGradient)">
      EXTEND
    </text>
    <path d="M0 42 H210" stroke="url(#bridgeLight)" stroke-width="2" stroke-linecap="round" opacity="0.54"/>
    <text x="230" y="42" font-family="'Avenir Next', 'Segoe UI', 'Helvetica Neue', sans-serif" font-size="12" font-weight="600" letter-spacing="3.2" fill="#a9c4d8">
      X11 TO ANDROID
    </text>
  </g>
</svg>
